<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multimedia - Tech Community</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="container py-4 text-center">
    <h2>Konten Multimedia</h2>
    <nav class="mb-4">
      <a href="./index.html" class="btn btn-secondary">Kembali ke Home</a>
    </nav>

    <div class="row">
      <div class="col-md-4 mb-4">
        <h5>Gambar Community</h5>
        <img
          id="gambarTech"
          src="img/poto-saya.jpg"
          width="300"
          class="img-fluid rounded mb-2"
        />
      </div>

      <div class="col-md-4 mb-4">
        <h5>Video Tutorial</h5>
        <div class="ratio ratio-16x9">
          <iframe
            src="https://www.youtube.com/embed/6XYcxERnNMc"
            allowfullscreen
          ></iframe>
        </div>
      </div>

      <div class="col-md-4 mb-4">
        <h5>Audio Podcast</h5>
        <audio id="audioTech" controls class="w-100 mb-2">
          <source
            src="Raim Laode - IQRO FOLK VERSION OFFICIAL LYRIC VIDEO.mp3"
            type="audio/mpeg"
          />
        </audio>
        <div class="btn-group">
          <button class="btn btn-success" onclick="putarAudio()">Play</button>
          <button class="btn btn-danger" onclick="stopAudio()">Pause</button>
        </div>
      </div>
    </div>

    <script>
      const audio = document.getElementById("audioTech");

      function putarAudio() {
        audio.play();
      }
      function stopAudio() {
        audio.pause();
      }
    </script>
  </body>
</html>
